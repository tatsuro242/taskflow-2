<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍵部材 卸値管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3348;
    --accent: #4fc3f7;
    --accent2: #f59e0b;
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --green: #34d399;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 12px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    border-left: 3px solid var(--accent);
  }

  header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  header span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* 入力エリア */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .input-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .input-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .input-row input, .input-row textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input:focus, .input-row textarea:focus {
    border-color: var(--accent);
  }

  .bulk-input {
    width: 100%;
    resize: vertical;
    min-height: 70px;
    font-size: 13px;
  }

  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f1117;
  }

  .btn-primary:active { transform: scale(0.97); }

  /* フィルター */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,195,247,0.08);
  }

  /* 件数バッジ */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .stat-chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
  }

  .stat-chip b { color: var(--accent); }

  /* テーブル */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
  }

  thead th {
    background: var(--surface2);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  thead th:last-child { text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 11px 14px;
    font-size: 13px;
    vertical-align: middle;
  }

  .td-maker {
    font-family: 'Share Tech Mono', monospace;
    font-weight: 700;
    color: var(--accent);
    font-size: 13px;
  }

  .td-type {
    color: var(--accent2);
    font-size: 12px;
    background: rgba(245,158,11,0.1);
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
  }

  .td-name { color: var(--text); }

  .td-price {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--green);
    text-align: right;
    white-space: nowrap;
  }

  .td-actions {
    text-align: center;
    white-space: nowrap;
  }

  .btn-del {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-del:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* 更新バッジ */
  .badge-updated {
    font-size: 9px;
    background: rgba(245,158,11,0.2);
    color: var(--accent2);
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* 空状態 */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* トースト */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* 検索 */
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }

  /* インポート・エクスポートセクション */
  .io-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }

  .io-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn-export-csv {
    background: rgba(52,211,153,0.12);
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 6px;
    padding: 9px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-export-csv:active { transform: scale(0.97); }

  .btn-export-json {
    background: rgba(79,195,247,0.10);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    padding: 9px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-export-json:active { transform: scale(0.97); }

  .btn-import {
    background: rgba(245,158,11,0.10);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 6px;
    padding: 9px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-import:active { transform: scale(0.97); }

  .io-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 4px;
  }

  /* モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  .modal textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 10px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    margin-bottom: 12px;
  }

  .modal textarea:focus { border-color: var(--accent2); }

  .modal-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .modal-radio-group {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .modal-radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
  }

  .modal-radio-group input[type=radio] {
    accent-color: var(--accent2);
  }

  /* テキスト表示モーダル用 */
  .export-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 10px;
    resize: none;
    height: 260px;
    outline: none;
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .btn-copy {
    background: rgba(52,211,153,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 6px;
    padding: 9px 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-copy:active { transform: scale(0.97); }

  .export-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .export-meta b { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>🔑 鍵部材 卸値管理</h1>
  <span id="clock"></span>
</header>

<!-- 入力エリア -->
<div class="input-section">
  <div class="input-label">▸ 部材入力</div>
  <div class="input-row">
    <textarea class="bulk-input" id="bulkInput"
      placeholder="例：MIWA. PR. LA. 4200&#10;例：GOAL. シリンダー. V18. 3500&#10;複数行まとめて入力OK"></textarea>
  </div>
  <div class="input-hint">形式: メーカー. 種類. 名称. 金額 ／ 同じ部材は金額を自動更新</div>
  <div class="input-row" style="margin-top:10px">
    <button class="btn btn-primary" onclick="bulkAdd()">追加 / 更新</button>
  </div>
</div>

<!-- インポート・エクスポート -->
<div class="io-section">
  <div class="input-label">▸ データ管理</div>
  <div class="io-row">
    <button class="btn-export-csv" onclick="showExportText('csv')">📋 CSV表示</button>
    <button class="btn-export-json" onclick="showExportText('json')">📋 JSON表示</button>
    <div class="io-divider"></div>
    <button class="btn-import" onclick="openImportModal()">⬆ インポート</button>
  </div>
</div>

<!-- テキスト表示モーダル（CSV/JSON） -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title" id="exportModalTitle">📋 テキスト表示</div>
    <div class="export-meta" id="exportMeta"></div>
    <textarea class="export-textarea" id="exportTextarea" readonly></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeExportModal()">閉じる</button>
      <button class="btn-copy" onclick="copyExportText()">📋 全選択してコピー</button>
    </div>
  </div>
</div>

<!-- インポートモーダル -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">⬆ データインポート</div>
    <div class="modal-radio-group">
      <label><input type="radio" name="importType" value="csv" checked onchange="updateImportHint()"> CSV形式</label>
      <label><input type="radio" name="importType" value="json" onchange="updateImportHint()"> JSON形式</label>
    </div>
    <div class="modal-hint" id="importHint">CSVフォーマット（ヘッダー行不要）:<br>メーカー,種類,名称,金額<br>例: MIWA,PR,LA,4200</div>
    <textarea id="importText" placeholder="ここにデータを貼り付け..."></textarea>
    <div class="modal-hint" style="color:var(--accent2)">※ 既存データとマージします。同じ部材は金額を上書き更新。</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeImportModal()">キャンセル</button>
      <button class="btn-import" onclick="doImport()" style="padding:8px 20px">取り込む</button>
    </div>
  </div>
</div>

<!-- 検索 -->
<input class="search-input" id="searchInput" placeholder="🔍 メーカー・種類・名称で検索..." oninput="render()">

<!-- フィルター -->
<div class="filter-row" id="makerFilters"></div>

<!-- 統計 -->
<div class="stats-bar" id="statsBar"></div>

<!-- テーブル -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>メーカー</th>
        <th>種類</th>
        <th>名称</th>
        <th style="text-align:right">卸値</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'key_parts_v1';
let parts = [];
let activeFilter = 'ALL';
let updatedKeys = new Set();

function load() {
  try { parts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { parts = []; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(parts));
}

function parseEntry(line) {
  // 区切りは . / ・/ スペースを組み合わせて対応
  const raw = line.trim();
  if (!raw) return null;
  // ピリオド区切り（スペース込み）
  const parts = raw.split(/\s*[.．]\s*/);
  if (parts.length >= 4) {
    const price = parseInt(parts[3].replace(/[^0-9]/g, ''), 10);
    if (isNaN(price)) return null;
    return {
      maker: parts[0].trim().toUpperCase(),
      type: parts[1].trim(),
      name: parts[2].trim(),
      price
    };
  }
  return null;
}

function bulkAdd() {
  const raw = document.getElementById('bulkInput').value;
  const lines = raw.split('\n');
  let added = 0, updated = 0;
  updatedKeys.clear();

  lines.forEach(line => {
    const entry = parseEntry(line);
    if (!entry) return;
    const key = `${entry.maker}__${entry.type}__${entry.name}`;
    const idx = parts.findIndex(p => p.maker === entry.maker && p.type === entry.type && p.name === entry.name);
    if (idx >= 0) {
      if (parts[idx].price !== entry.price) {
        parts[idx].price = entry.price;
        updated++;
        updatedKeys.add(key);
      }
    } else {
      parts.push(entry);
      added++;
    }
  });

  save();
  document.getElementById('bulkInput').value = '';
  render();
  const msg = [added && `${added}件追加`, updated && `${updated}件更新`].filter(Boolean).join('・');
  if (msg) showToast(msg);
  else showToast('変更なし');
}

function deletePart(idx) {
  parts.splice(idx, 1);
  save();
  render();
  showToast('削除しました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();

  // メーカー一覧
  const makers = ['ALL', ...new Set(parts.map(p => p.maker))];
  const filterDiv = document.getElementById('makerFilters');
  filterDiv.innerHTML = makers.map(m =>
    `<button class="filter-btn ${m === activeFilter ? 'active' : ''}" onclick="setFilter('${m}')">${m}</button>`
  ).join('');

  // フィルタ + 検索
  let filtered = parts.map((p, i) => ({ ...p, _i: i }));
  if (activeFilter !== 'ALL') filtered = filtered.filter(p => p.maker === activeFilter);
  if (q) filtered = filtered.filter(p =>
    p.maker.toLowerCase().includes(q) ||
    p.type.toLowerCase().includes(q) ||
    p.name.toLowerCase().includes(q)
  );

  // ソート: メーカー→種類→名称
  filtered.sort((a, b) => a.maker.localeCompare(b.maker) || a.type.localeCompare(b.type) || a.name.localeCompare(b.name));

  // 統計
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = `
    <div class="stat-chip">合計 <b>${filtered.length}</b> 件</div>
    ${activeFilter !== 'ALL' ? `<div class="stat-chip">メーカー: <b>${activeFilter}</b></div>` : ''}
  `;

  // テーブル
  const tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty">部材が登録されていません</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(p => {
    const key = `${p.maker}__${p.type}__${p.name}`;
    const badge = updatedKeys.has(key) ? '<span class="badge-updated">更新</span>' : '';
    return `
      <tr>
        <td class="td-maker">${p.maker}</td>
        <td><span class="td-type">${p.type}</span></td>
        <td class="td-name">${p.name}${badge}</td>
        <td class="td-price">¥${p.price.toLocaleString()}</td>
        <td class="td-actions">
          <button class="btn-del" onclick="deletePart(${p._i})">削除</button>
        </td>
      </tr>
    `;
  }).join('');
}

function setFilter(maker) {
  activeFilter = maker;
  render();
}

// ── エクスポート（テキスト表示） ──────────────────────────────
function showExportText(type) {
  if (parts.length === 0) { showToast('データがありません'); return; }
  const sorted = [...parts].sort((a,b) => a.maker.localeCompare(b.maker) || a.type.localeCompare(b.type) || a.name.localeCompare(b.name));

  let text = '';
  let title = '';
  if (type === 'csv') {
    const header = 'メーカー,種類,名称,金額';
    const rows = sorted.map(p => p.maker + ',' + p.type + ',' + p.name + ',' + p.price);
    text = [header, ...rows].join('\n');
    title = '📋 CSV テキスト表示';
  } else {
    text = JSON.stringify(sorted, null, 2);
    title = '📋 JSON テキスト表示';
  }

  document.getElementById('exportModalTitle').textContent = title;
  document.getElementById('exportMeta').innerHTML = '<b>' + parts.length + '</b> 件 ／ ' + dateStr();
  document.getElementById('exportTextarea').value = text;
  document.getElementById('exportModal').classList.add('open');
}

function closeExportModal() {
  document.getElementById('exportModal').classList.remove('open');
}

function copyExportText() {
  const ta = document.getElementById('exportTextarea');
  ta.select();
  ta.setSelectionRange(0, 99999);
  try {
    navigator.clipboard.writeText(ta.value).then(() => {
      showToast('コピーしました');
    }).catch(() => {
      document.execCommand('copy');
      showToast('コピーしました');
    });
  } catch(e) {
    document.execCommand('copy');
    showToast('コピーしました');
  }
}

function dateStr() {
  const d = new Date();
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

// ── インポート ──────────────────────────────
function openImportModal() {
  document.getElementById('importModal').classList.add('open');
  document.getElementById('importText').value = '';
  updateImportHint();
}

function closeImportModal() {
  document.getElementById('importModal').classList.remove('open');
}

function updateImportHint() {
  const type = document.querySelector('input[name=importType]:checked').value;
  const hint = document.getElementById('importHint');
  if (type === 'csv') {
    hint.innerHTML = 'CSVフォーマット（ヘッダー行不要）:<br>メーカー,種類,名称,金額<br>例: MIWA,PR,LA,4200';
  } else {
    hint.innerHTML = 'JSONフォーマット（エクスポートしたファイルをそのまま貼付）:<br>[{"maker":"MIWA","type":"PR","name":"LA","price":4200}]';
  }
}

function doImport() {
  const type = document.querySelector('input[name=importType]:checked').value;
  const raw = document.getElementById('importText').value.trim();
  if (!raw) { showToast('データを入力してください'); return; }

  let entries = [];
  try {
    if (type === 'json') {
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) throw new Error();
      entries = parsed.map(p => ({
        maker: String(p.maker || '').trim().toUpperCase(),
        type:  String(p.type  || '').trim(),
        name:  String(p.name  || '').trim(),
        price: parseInt(p.price, 10)
      })).filter(p => p.maker && p.type && p.name && !isNaN(p.price));
    } else {
      const lines = raw.split(/\r?\n/).filter(l => l.trim());
      entries = lines.map(line => {
        const cols = line.split(',');
        if (cols.length < 4) return null;
        const price = parseInt(cols[3].replace(/[^0-9]/g,''), 10);
        if (isNaN(price)) return null;
        const maker = cols[0].trim().toUpperCase();
        if (maker === 'メーカー' || maker === 'MAKER') return null;
        return { maker, type: cols[1].trim(), name: cols[2].trim(), price };
      }).filter(Boolean);
    }
  } catch(e) {
    showToast('フォーマットエラー');
    return;
  }

  if (entries.length === 0) { showToast('有効なデータがありません'); return; }

  let added = 0, updated = 0;
  updatedKeys.clear();
  entries.forEach(entry => {
    const key = entry.maker + '__' + entry.type + '__' + entry.name;
    const idx = parts.findIndex(p => p.maker === entry.maker && p.type === entry.type && p.name === entry.name);
    if (idx >= 0) {
      if (parts[idx].price !== entry.price) {
        parts[idx].price = entry.price;
        updated++;
        updatedKeys.add(key);
      }
    } else {
      parts.push(entry);
      added++;
    }
  });

  save();
  closeImportModal();
  render();
  const msg = [added && (added + '件追加'), updated && (updated + '件更新')].filter(Boolean).join('・');
  showToast(msg || '変更なし');
}

// 時計
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleString('ja-JP', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

load();
render();
</script>
