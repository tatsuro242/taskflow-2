<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10;
  --surface: #0e1219;
  --surface2: #141b26;
  --surface3: #1a2235;
  --border: #1e2d42;
  --border2: #253347;
  --accent: #38bdf8;
  --accent2: #818cf8;
  --accent3: #34d399;
  --success: #34d399;
  --warn: #fbbf24;
  --danger: #f87171;
  --text: #e2e8f0;
  --text2: #7a8fa8;
  --text3: #354860;
  --grid: repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(30,45,66,.4) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(30,45,66,.4) 40px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);background-image:var(--grid);color:var(--text);font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(56,189,248,.06),transparent);pointer-events:none;z-index:0}

/* HEADER */
.app-header{flex-shrink:0;background:rgba(14,18,25,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:50}
.app-logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
.app-logo span{color:var(--text2)}
.header-right{display:flex;align-items:center;gap:8px}
.header-date-pill{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text2);display:flex;align-items:center;gap:6px}
.header-date-pill .wd{color:var(--accent);font-weight:700}
.date-nav-wrap{display:flex;gap:4px}
.date-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2)}
.date-nav-btn svg{width:14px;height:14px}

/* MAIN */
.app-main{flex:1;overflow:hidden;position:relative;z-index:1}
.page{display:none;height:100%;overflow-y:auto;padding:12px 12px 70px;-webkit-overflow-scrolling:touch}
.page.active{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* NAV */
.nav{flex-shrink:0;background:rgba(14,18,25,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);position:relative;z-index:50}
.nav-btn{flex:1;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;color:var(--text3);font-size:8px;font-family:inherit;cursor:pointer;transition:color .2s;letter-spacing:.3px;text-transform:uppercase;min-width:0}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:18px;height:18px}
.nav-dot{width:4px;height:4px;border-radius:2px;background:var(--accent);display:none;margin-top:1px}
.nav-btn.active .nav-dot{display:block}

/* DASHBOARD GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.dash-card.c-blue::before{background:linear-gradient(90deg,var(--accent),transparent)}
.dash-card.c-green::before{background:linear-gradient(90deg,var(--success),transparent)}
.dash-card.c-purple::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.dash-card.c-warn::before{background:linear-gradient(90deg,var(--warn),transparent)}
.dash-val{font-size:32px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px}
.dash-label{font-size:10px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.dash-sub{font-size:10px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.v-blue{color:var(--accent)}.v-green{color:var(--success)}.v-purple{color:var(--accent2)}.v-warn{color:var(--warn)}
.progress-bar{height:4px;background:var(--surface3);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
.pf-blue{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.pf-green{background:linear-gradient(90deg,var(--success),#a7f3d0)}

/* SECTION HEADER */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px}
.sec-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.sec-line{width:16px;height:1px;background:var(--border2)}
.sec-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:10px;padding:2px 8px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.sec-action{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:11px;color:var(--text2);font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px}
.sec-action:hover{border-color:var(--accent);color:var(--accent)}

/* TIMELINE STRIP */
.timeline-strip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 0;margin-bottom:8px;overflow-x:auto}
.timeline-inner{display:flex;gap:2px;padding:0 10px;min-width:max-content}
.tl-cell{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.tl-num{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text3);width:24px;text-align:center}
.tl-bar{width:24px;height:28px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);transition:all .15s;position:relative;overflow:hidden}
.tl-bar.has-log{background:rgba(56,189,248,.15);border-color:rgba(56,189,248,.4)}
.tl-bar.cur-hour{border-color:var(--accent);box-shadow:0 0 6px rgba(56,189,248,.3)}
.tl-bar.cur-hour::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}

/* FILTER TABS */
.filter-tabs{display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;padding-bottom:2px}
.filter-tab{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:10px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.filter-tab.active{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.4);color:var(--accent)}

/* TASK LIST */
.task-list-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);transition:background .15s}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:var(--surface2)}
.task-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check.done{background:var(--success);border-color:var(--success)}
.task-check.done::after{content:'✓';color:#000;font-size:10px;font-weight:900}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;line-height:1.4;font-weight:500}
.task-name.done{text-decoration:line-through;color:var(--text3)}
.task-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.t-work{background:rgba(56,189,248,.1);color:var(--accent);border:1px solid rgba(56,189,248,.2)}
.t-priv{background:rgba(52,211,153,.1);color:var(--success);border:1px solid rgba(52,211,153,.2)}
.t-p1{background:rgba(248,113,113,.1);color:var(--danger);border:1px solid rgba(248,113,113,.2)}
.t-p2{background:rgba(251,191,36,.1);color:var(--warn);border:1px solid rgba(251,191,36,.2)}
.t-p3{background:rgba(52,211,153,.1);color:var(--success);border:1px solid rgba(52,211,153,.2)}
.t-rep{background:rgba(129,140,248,.1);color:var(--accent2);border:1px solid rgba(129,140,248,.2)}
.task-dl{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.task-dl.overdue{color:var(--danger)}
.task-memo{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4}
.task-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px;border-radius:5px;transition:all .15s}
.icon-btn:hover{color:var(--text2);background:var(--surface3)}
.icon-btn svg{width:14px;height:14px}
.add-task-btn{width:100%;padding:10px 12px;border:1px dashed var(--border2);border-radius:10px;background:none;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;margin-top:8px}
.add-task-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.03)}

/* OVERDUE BANNER */
.overdue-banner{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--danger)}

/* HABIT */
.hsum-bar{display:flex;gap:8px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.hsum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;flex-shrink:0;text-align:center;min-width:60px}
.hsum-icon{font-size:18px}
.hsum-count{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace}
.hsum-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.habit-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.habit-item{padding:10px 12px;border-bottom:1px solid var(--border)}
.habit-item:last-child{border-bottom:none}
.habit-row1{display:flex;align-items:center;gap:8px}
.habit-name{flex:1;font-size:13px;font-weight:500}
.habit-streak{font-size:10px;color:var(--warn);font-family:'JetBrains Mono',monospace}
.habit-btns{display:flex;gap:5px}
.habit-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border2);background:none;cursor:pointer;font-size:15px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.h-maru{background:rgba(52,211,153,.15);border-color:#34d399;box-shadow:0 0 8px rgba(52,211,153,.2)}
.h-sankaku{background:rgba(251,191,36,.15);border-color:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.2)}
.h-batsu{background:rgba(248,113,113,.15);border-color:#f87171;box-shadow:0 0 8px rgba(248,113,113,.2)}
.habit-memo-input{width:100%;margin-top:7px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:11px;font-family:inherit;outline:none;resize:none}
.habit-memo-input:focus{border-color:var(--accent)}
.habit-heatmap{display:flex;gap:2px;margin-top:5px}
.hm-cell{width:12px;height:12px;border-radius:3px;background:var(--surface2);border:1px solid var(--border)}
.hm-cell.maru{background:rgba(52,211,153,.5);border-color:#34d399}
.hm-cell.sankaku{background:rgba(251,191,36,.4);border-color:#fbbf24}
.hm-cell.batsu{background:rgba(248,113,113,.3);border-color:#f87171}

/* HABIT TIMING SECTION */
.habit-section{margin-bottom:10px}
.habit-section-header{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none}
.habit-section-icon{font-size:14px}
.habit-section-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.habit-section-count{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);margin-left:auto}
.habit-section-body{background:var(--surface);border:1px solid var(--border);border-radius:0 0 12px 12px;overflow:hidden}
.habit-section-empty{padding:12px 14px;font-size:11px;color:var(--text3);text-align:center}
/* morning = warm yellow, night = indigo, allday = teal */
.hs-morning .habit-section-header{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.25)}
.hs-morning .habit-section-title{color:#fbbf24}
.hs-night   .habit-section-header{background:rgba(129,140,248,.06);border-color:rgba(129,140,248,.25)}
.hs-night   .habit-section-title{color:#818cf8}
.hs-allday  .habit-section-header{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.25)}
.hs-allday  .habit-section-title{color:#34d399}
/* order buttons */
.habit-order-btns{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.order-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:1px 3px;line-height:1;font-size:11px;transition:color .1s}
.order-btn:hover{color:var(--text2)}
.order-btn:disabled{opacity:.2;cursor:default}
/* timing badge in habit */
.timing-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
.tb-morning{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.tb-night{background:rgba(129,140,248,.12);color:#818cf8;border:1px solid rgba(129,140,248,.25)}
.tb-allday{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
/* timing selector in modal */
.timing-tabs{display:flex;gap:4px}
.timing-tab{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--border2);background:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--text2);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px}
.timing-tab .tt-icon{font-size:16px}
.timing-tab .tt-label{font-size:9px;letter-spacing:.3px}
.timing-tab.sel-morning{background:rgba(251,191,36,.12);border-color:#fbbf24;color:#fbbf24}
.timing-tab.sel-night{background:rgba(129,140,248,.12);border-color:#818cf8;color:#818cf8}
.timing-tab.sel-allday{background:rgba(52,211,153,.12);border-color:#34d399;color:#34d399}
.tl-page-wrap{display:flex;flex-direction:column;gap:8px}
.tl-gantt-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tl-gantt-header{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);gap:6px}
.tl-gantt-header-label{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase}
/* hour axis */
.tl-axis-wrap{position:relative;overflow:hidden}
.tl-axis-row{display:flex;height:22px;border-bottom:1px solid var(--border)}
.tl-axis-spacer{width:56px;flex-shrink:0;border-right:1px solid var(--border)}
.tl-axis-hours{flex:1;position:relative;overflow:hidden}
.tl-axis-tick{position:absolute;top:0;bottom:0;display:flex;align-items:center;padding-left:3px}
.tl-axis-tick-label{font-size:8px;font-family:'JetBrains Mono',monospace;color:var(--text3)}
.tl-axis-tick-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);left:0}
/* shift bar row */
.tl-shift-row{display:flex;align-items:center;height:28px;border-bottom:1px solid var(--border)}
.tl-row-label{width:56px;flex-shrink:0;font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text2);padding:0 6px 0 10px;text-align:right;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;justify-content:flex-end}
.tl-row-bars{flex:1;position:relative;height:100%;background:var(--surface2)}
.tl-shift-fill{position:absolute;top:4px;bottom:4px;border-radius:3px;opacity:.35}
.tl-shift-label-over{position:absolute;top:50%;transform:translateY(-50%);font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:0 6px;white-space:nowrap}
/* task bar row */
.tl-task-row{display:flex;align-items:center;min-height:34px;border-bottom:1px solid var(--border)}
.tl-task-row:last-child{border-bottom:none}
.tl-task-label{width:56px;flex-shrink:0;font-size:9px;color:var(--text2);padding:4px 6px 4px 10px;text-align:right;border-right:1px solid var(--border);line-height:1.3;word-break:break-all;align-self:stretch;display:flex;align-items:center;justify-content:flex-end}
.tl-task-bars-wrap{flex:1;position:relative;min-height:34px;background:var(--surface2)}
.tl-task-bar{position:absolute;top:6px;bottom:6px;border-radius:4px;transition:all .2s;cursor:default}
.tl-task-bar.ok{background:linear-gradient(90deg,rgba(56,189,248,.7),rgba(129,140,248,.6));border:1px solid rgba(56,189,248,.4)}
.tl-task-bar.over{background:linear-gradient(90deg,rgba(248,113,113,.8),rgba(248,113,113,.4));border:1px solid rgba(248,113,113,.5);animation:overPulse 2s infinite}
@keyframes overPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.3)}50%{box-shadow:0 0 0 3px rgba(248,113,113,.15)}}
.tl-task-bar-label{position:absolute;top:50%;transform:translateY(-50%);left:6px;font-size:9px;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;font-weight:600}
.tl-over-marker{position:absolute;top:0;bottom:0;width:2px;background:var(--danger);opacity:.7}
/* now line */
.tl-now-line{position:absolute;top:0;bottom:0;width:1.5px;background:var(--accent);z-index:10;pointer-events:none}
.tl-now-dot{position:absolute;top:-3px;width:7px;height:7px;border-radius:4px;background:var(--accent);left:-3px}
/* log input section */
.tl-log-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.timelog-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border)}
.timelog-row:last-child{border-bottom:none}
.timelog-row.cur-row{background:rgba(56,189,248,.025)}
.tl-hour{width:48px;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:7px 6px 7px 10px;display:flex;align-items:center;justify-content:flex-end;flex-shrink:0;border-right:1px solid var(--border)}
.tl-hour.filled{color:var(--accent)}
.tl-input{flex:1;background:none;border:none;padding:7px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;min-height:34px}
.tl-input::placeholder{color:var(--text3)}
.tl-input:focus{background:rgba(56,189,248,.03)}
/* no-task hint */
.tl-no-task{padding:12px;text-align:center;font-size:11px;color:var(--text3)}

/* SHARE */
.share-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.share-label{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.share-box{background:var(--bg);border-radius:8px;padding:12px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text2);white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto;line-height:1.7;border:1px solid var(--border)}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn{padding:11px 16px;border-radius:9px;border:none;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;flex:1}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text2);flex:1}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-success{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);color:var(--success);flex:1}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:16px 16px 40px;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-title::before{content:'';width:3px;height:16px;background:var(--accent);border-radius:2px}
.form-group{margin-bottom:12px}
.form-label{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(56,189,248,.1)}
.form-textarea{resize:vertical;min-height:65px;line-height:1.5}
.form-select option{background:var(--surface2)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.empty-state{padding:30px 20px;text-align:center;color:var(--text3);font-size:12px}

/* TOAST */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:9px 16px;font-size:12px;z-index:300;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* SHIFT SELECTOR */
.shift-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.shift-bar-label{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.shift-bar-label::before{content:'';width:3px;height:10px;background:var(--accent2);border-radius:2px}
.shift-btns{display:flex;gap:5px}
.shift-btn{flex:1;padding:7px 2px;border-radius:8px;border:1.5px solid var(--border2);background:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--text2);transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1}
.shift-btn .s-name{font-size:14px}
.shift-btn .s-time{font-size:8px;font-weight:400;color:var(--text3);letter-spacing:0;font-family:'Noto Sans JP',sans-serif}
.shift-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.shift-btn.sel-F{background:rgba(56,189,248,.12);border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px rgba(56,189,248,.15)}
.shift-btn.sel-H{background:rgba(52,211,153,.12);border-color:var(--success);color:var(--success);box-shadow:0 0 8px rgba(52,211,153,.15)}
.shift-btn.sel-C{background:rgba(251,191,36,.12);border-color:var(--warn);color:var(--warn);box-shadow:0 0 8px rgba(251,191,36,.15)}
.shift-btn.sel-K{background:rgba(248,113,113,.12);border-color:var(--danger);color:var(--danger);box-shadow:0 0 8px rgba(248,113,113,.15)}
.shift-btn.sel-off{background:rgba(129,140,248,.12);border-color:var(--accent2);color:var(--accent2);box-shadow:0 0 8px rgba(129,140,248,.15)}
.shift-active-banner{display:none;align-items:center;gap:8px;margin-top:8px;padding:7px 10px;border-radius:8px;font-size:11px;font-weight:600}
.shift-active-banner.visible{display:flex}
.shift-active-banner .sab-dot{width:7px;height:7px;border-radius:4px;flex-shrink:0}

/* ===== SALES PAGE ===== */
/* 月合計カード */
.sps-month-total{grid-column:1/-1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.sps-month-total::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--success))}

/* period tabs */
.sales-period-tabs{display:flex;gap:0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.spt{flex:1;padding:8px 4px;border:none;background:none;color:var(--text2);font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;letter-spacing:.3px;border-right:1px solid var(--border)}
.spt:last-child{border-right:none}
.spt.active{background:var(--surface3);color:var(--accent)}

/* period summary cards - 3 column strip */
.sales-period-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px;grid-template-rows:auto auto}
.sps-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;position:relative;overflow:hidden}
.sps-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sps-card.total-color::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.sps-card.cash-color::before{background:linear-gradient(90deg,var(--success),#a7f3d0)}
.sps-card.active-period{box-shadow:0 0 0 1.5px var(--accent)}
.sps-card-period{font-size:8px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:.3px;margin-bottom:4px}
.sps-card-val{font-size:14px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1}
.sps-card-val.tv{color:var(--accent)}
.sps-card-val.cv{color:var(--success)}
.sps-card-sub{font-size:8px;color:var(--text3);margin-top:2px}

/* month nav for sales */
.sales-month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:12px}
.smn-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;display:flex}
.smn-btn svg{width:16px;height:16px}
.smn-title{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text)}
.smn-today{font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:inherit}

/* daily input section */
.sales-input-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.sic-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sic-header-left{display:flex;align-items:center;gap:8px}
.sic-date-badge{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.sic-shift-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.sic-total-preview{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text2)}

/* input rows */
.sales-input-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.sales-input-row:last-child{border-bottom:none}
.sales-input-row.cash-row{background:rgba(52,211,153,.03)}
.sir-label{font-size:11px;color:var(--text2);width:72px;flex-shrink:0;font-weight:600}
.sir-label.cash-label{color:var(--success)}
.sir-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:15px;font-family:'JetBrains Mono',monospace;font-weight:700;outline:none;text-align:right;-webkit-appearance:none}
.sir-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(56,189,248,.1)}
.sir-input.cash-input:focus{border-color:var(--success);box-shadow:0 0 0 2px rgba(52,211,153,.1)}
.sir-yen{font-size:13px;color:var(--text2);flex-shrink:0}
.sir-sep{width:100%;height:1px;background:var(--border2);margin:2px 0}

/* total row */
.sales-total-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(56,189,248,.04);border-top:1px solid var(--border)}
.str-label{font-size:11px;font-weight:700;color:var(--accent)}
.str-val{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--accent)}

/* day list */
.sales-day-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.sdl-row{display:flex;align-items:center;gap:6px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.sdl-row:last-child{border-bottom:none}
.sdl-row:hover{background:var(--surface2)}
.sdl-row.active-day{background:rgba(56,189,248,.08);border-left:2px solid var(--accent)}
.sdl-date{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;width:32px;flex-shrink:0}
.sdl-wd{font-size:9px;width:18px;flex-shrink:0;color:var(--text3)}
.sdl-shift{font-size:9px;font-weight:700;width:24px;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.sdl-bars{flex:1;display:flex;flex-direction:column;gap:2px}
.sdl-bar-row{display:flex;align-items:center;gap:4px}
.sdl-bar-label{font-size:8px;color:var(--text3);width:16px;flex-shrink:0;text-align:right}
.sdl-bar-track{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.sdl-bar-fill{height:100%;border-radius:3px;transition:width .3s ease}
.sdl-vals{flex-shrink:0;text-align:right;min-width:60px}
.sdl-total-val{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.sdl-cash-val{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--success)}
.sdl-empty{font-size:10px;color:var(--text3)}

/* save button */
.sales-save-btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px}
.sales-save-btn:hover{opacity:.9}
/* divider */
.sales-divider{height:1px;background:var(--border2);margin:6px 14px}
/* cash section header */
.cash-section-head{padding:8px 14px 4px;font-size:9px;font-weight:700;color:var(--success);letter-spacing:.8px;text-transform:uppercase}

/* ===== CALENDAR MODAL ===== */
.cal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:250;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.cal-overlay.open{display:flex}
.cal-sheet{background:var(--surface);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;padding:16px 16px 40px;animation:slideUp .22s ease;max-height:92vh;overflow-y:auto}
.cal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 14px}

/* view switcher */
.cal-view-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--surface2);border-radius:10px;padding:4px}
.cal-view-tab{flex:1;padding:7px 4px;border:none;background:none;color:var(--text2);font-size:11px;font-weight:700;font-family:inherit;border-radius:7px;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.cal-view-tab.active{background:var(--surface3);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* month nav */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2)}
.cal-nav-btn svg{width:16px;height:16px}
.cal-nav-title{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);letter-spacing:1px}

/* day-of-week header */
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dow-cell{text-align:center;font-size:9px;font-weight:700;color:var(--text3);padding:4px 0;letter-spacing:.5px}
.cal-dow-cell.sun{color:#f87171}.cal-dow-cell.sat{color:#818cf8}

/* MONTH VIEW grid */
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{min-height:52px;border-radius:8px;padding:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;display:flex;flex-direction:column;gap:2px}
.cal-day:hover{background:var(--surface2);border-color:var(--border)}
.cal-day.other-month .cal-day-num{color:var(--text3)}
.cal-day.today{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.06)}
.cal-day.selected{border-color:var(--accent);background:rgba(56,189,248,.12)}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:900}
.cal-day-num{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:600;line-height:1;color:var(--text2)}
.cal-day.sun-col .cal-day-num{color:#f87171}
.cal-day.sat-col .cal-day-num{color:#818cf8}
.cal-day.today .cal-day-num,.cal-day.selected .cal-day-num{color:var(--accent)}
/* shift dot in month */
.cal-shift-dot{width:100%;height:4px;border-radius:2px;margin-top:1px}
/* task dots */
.cal-task-dots{display:flex;gap:1px;flex-wrap:wrap;margin-top:2px}
.cal-task-dot{width:5px;height:5px;border-radius:3px}
/* habit mini bar */
.cal-habit-bar{height:3px;border-radius:2px;margin-top:1px;background:var(--surface3);overflow:hidden}
.cal-habit-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--success),#a7f3d0)}

/* 10-DAY VIEW */
.cal-10day-wrap{display:flex;flex-direction:column;gap:4px}
.cal-10day-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s}
.cal-10day-row:hover{border-color:var(--accent);background:rgba(56,189,248,.05)}
.cal-10day-row.today{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.08)}
.cal-10day-row.selected{border-color:var(--accent);background:rgba(56,189,248,.13)}
.c10-date{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;width:36px;flex-shrink:0}
.c10-wd{font-size:10px;width:24px;flex-shrink:0}
.c10-shift{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;width:28px;flex-shrink:0}
.c10-bar-wrap{flex:1;height:10px;background:var(--surface3);border-radius:5px;overflow:hidden;position:relative}
.c10-shift-fill{position:absolute;top:0;bottom:0;border-radius:5px;opacity:.5}
.c10-task-pills{display:flex;gap:3px;flex-shrink:0;flex-wrap:wrap;max-width:100px}
.c10-task-pill{height:6px;width:6px;border-radius:3px}
.c10-habit{font-size:9px;color:var(--text3);width:28px;text-align:right;flex-shrink:0}

/* 1-DAY VIEW */
.cal-1day-wrap{display:flex;flex-direction:column;gap:8px}
.cal-1day-info{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.cal-1day-title{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);margin-bottom:4px}
.cal-1day-shift{font-size:12px;color:var(--text2);margin-bottom:10px}
.cal-1day-task-list{display:flex;flex-direction:column;gap:4px}
.cal-1day-task-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface3);border-radius:8px;border-left:3px solid transparent}
.cal-1day-task-name{font-size:12px;flex:1}
.cal-1day-task-time{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text2)}

/* today button */
.cal-today-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--text2);font-family:inherit;cursor:pointer;font-weight:600}
.cal-today-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.cal-goto-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
/* cal btn in header */
.cal-open-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s}
.cal-open-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-open-btn svg{width:14px;height:14px}
/* TASK SECTIONS */
.task-section{margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.task-section-hd{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;border-bottom:1px solid transparent}
.task-section-hd.has-items{border-bottom-color:var(--border)}
.task-section-icon{font-size:13px;flex-shrink:0}
.task-section-label{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;flex:1}
.task-section-badge{font-size:10px;font-family:'JetBrains Mono',monospace;padding:1px 7px;border-radius:5px;border:1px solid}
.task-section-chevron{font-size:10px;color:var(--text3);flex-shrink:0;transition:transform .2s}
.task-section-chevron.closed{transform:rotate(-90deg)}
.task-section-body{background:var(--surface)}
/* today = accent blue */
.ts-today .task-section-hd{background:rgba(56,189,248,.05)}
.ts-today .task-section-label{color:var(--accent)}
.ts-today .task-section-badge{background:rgba(56,189,248,.1);color:var(--accent);border-color:rgba(56,189,248,.25)}
.ts-today{border-color:rgba(56,189,248,.2)}
/* undone = danger red */
.ts-undone .task-section-hd{background:rgba(248,113,113,.05)}
.ts-undone .task-section-label{color:var(--danger)}
.ts-undone .task-section-badge{background:rgba(248,113,113,.1);color:var(--danger);border-color:rgba(248,113,113,.25)}
.ts-undone{border-color:rgba(248,113,113,.2)}
/* future = purple */
.ts-future .task-section-hd{background:rgba(129,140,248,.05)}
.ts-future .task-section-label{color:var(--accent2)}
.ts-future .task-section-badge{background:rgba(129,140,248,.1);color:var(--accent2);border-color:rgba(129,140,248,.25)}
.ts-future{border-color:rgba(129,140,248,.2)}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">Task<span>Flow</span></div>
  <div class="header-right">
    <div class="date-nav-wrap">
      <button class="date-nav-btn" onclick="changeDate(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="date-nav-btn" onclick="changeDate(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <button class="cal-open-btn" onclick="openCalendar()" title="カレンダー">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </button>
    <div class="header-date-pill"><span id="hdr-date"></span><span class="wd" id="hdr-wd"></span></div>
  </div>
</header>

<main class="app-main">

  <!-- TASKS PAGE -->
  <div id="page-tasks" class="page active">
    <div class="dash-grid">
      <div class="dash-card c-blue">
        <div class="dash-val v-blue" id="kpi-total">0</div>
        <div class="dash-label">今日のタスク</div>
        <div class="dash-sub" id="kpi-remaining">残り 0 件</div>
        <div class="progress-bar"><div class="progress-fill pf-blue" id="kpi-prog" style="width:0%"></div></div>
      </div>
      <div class="dash-card c-green">
        <div class="dash-val v-green" id="kpi-done">0</div>
        <div class="dash-label">完了</div>
        <div class="dash-sub" id="kpi-rate">達成率 0%</div>
        <div class="progress-bar" style="background:rgba(52,211,153,.1)"><div class="progress-fill pf-green" id="kpi-prog2" style="width:0%"></div></div>
      </div>
      <div class="dash-card c-warn">
        <div class="dash-val v-warn" id="kpi-overdue">0</div>
        <div class="dash-label">期限超過</div>
        <div class="dash-sub">要対応</div>
      </div>
      <div class="dash-card c-purple">
        <div class="dash-val v-purple" id="kpi-habit">0</div>
        <div class="dash-label">習慣チェック済</div>
        <div class="dash-sub" id="kpi-habit-total">/ 0 習慣</div>
      </div>
    </div>

    <div class="timeline-strip" id="tl-strip"></div>

    <!-- SHIFT SELECTOR -->
    <div class="shift-bar">
      <div class="shift-bar-label">シフト</div>
      <div class="shift-btns">

<script>
let state = { tasks:[], habits:[], habitLogs:{}, timelogs:{}, shifts:{}, sales:{} };
let currentDate = new Date();
let editingTaskId = null;
let currentFilter = 'all';
const DAYS = ['日','月','火','水','木','金','土'];

const dk = d => {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const today = () => dk(new Date());
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmtDate = d => `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = type==='ok'?'rgba(52,211,153,.4)':type==='err'?'rgba(248,113,113,.4)':'';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}

function changeDate(d) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate()+d);
  updateHeader(); renderTasks(); renderHabits(); renderTimelog(); renderTimelineStrip(); renderShift();
}

function updateHeader() {
  document.getElementById('hdr-date').textContent = fmtDate(currentDate);
  document.getElementById('hdr-wd').textContent = DAYS[currentDate.getDay()]+'曜日';
}

// SHIFT
const SHIFTS = {
  F: { label:'F番', time:'8:00〜18:00', start:8,  end:18, color:'var(--accent)',  dot:'#38bdf8', cls:'sel-F' },
  H: { label:'H番', time:'10:00〜20:00',start:10, end:20, color:'var(--success)', dot:'#34d399', cls:'sel-H' },
  C: { label:'C番', time:'12:00〜22:00',start:12, end:22, color:'var(--warn)',    dot:'#fbbf24', cls:'sel-C' },
  K: { label:'K番', time:'14:00〜24:00',start:14, end:24, color:'var(--danger)',  dot:'#f87171', cls:'sel-K' },
  off:{ label:'休日',time:'—',           start:null,end:null,color:'var(--accent2)',dot:'#818cf8',cls:'sel-off' },
};
function setShift(code) {
  const dKey = dk(currentDate);
  if(!state.shifts) state.shifts={};
  // toggle off if same
  if(state.shifts[dKey]===code) { delete state.shifts[dKey]; }
  else { state.shifts[dKey]=code; }
  saveState(); renderShift(); renderTimelineStrip();
}
function renderShift() {
  const dKey = dk(currentDate);
  const code = state.shifts && state.shifts[dKey];
  // reset all buttons
  Object.keys(SHIFTS).forEach(k => {
    const btn = document.getElementById('sb-'+k);
    if(btn) { btn.className='shift-btn'; if(code===k) btn.classList.add(SHIFTS[k].cls); }
  });
  const banner = document.getElementById('shift-banner');
  if(code && SHIFTS[code]) {
    const s = SHIFTS[code];
    banner.className='shift-active-banner visible';
    banner.style.background = `rgba(${hexToRgb(s.dot)},.08)`;
    banner.style.border = `1px solid rgba(${hexToRgb(s.dot)},.25)`;
    banner.style.color = s.color;
    banner.innerHTML = `<span class="sab-dot" style="background:${s.dot}"></span>${s.label}　${s.time}`;
  } else {
    banner.className='shift-active-banner';
  }
}
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function renderTimelineStrip() {
  const dKey = dk(currentDate);
  const log = state.timelogs[dKey]||{};
  const now = new Date(); const curHour = now.getHours();
  const isToday = dKey===today();
  const shiftCode = state.shifts && state.shifts[dKey];
  const shift = shiftCode && SHIFTS[shiftCode];
  let html = '<div class="timeline-inner">';
  for(let h=0;h<=23;h++) {
    const hh = String(h).padStart(2,'0');
    const hasLog = !!log[hh]; const isCur = isToday && h===curHour;
    const inShift = shift && shift.start!==null && h>=shift.start && h<shift.end;
    let barStyle = '';
    if(inShift && shiftCode) barStyle = `style="border-color:${SHIFTS[shiftCode].dot};background:rgba(${hexToRgb(SHIFTS[shiftCode].dot)},.18)"`;
    html += `<div class="tl-cell" onclick="gotoTimelog(${h})"><div class="tl-bar${hasLog?' has-log':''}${isCur?' cur-hour':''}" ${barStyle}></div><div class="tl-num" style="${inShift&&shiftCode?`color:${SHIFTS[shiftCode].dot}`:''}">${hh}</div></div>`;
  }
  html += '</div>';
  document.getElementById('tl-strip').innerHTML = html;
}
function gotoTimelog(h) {
  document.querySelectorAll('.nav-btn')[2].click();
  setTimeout(()=>{ const el=document.getElementById('tl-'+String(h).padStart(2,'0')); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },150);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); renderTasks();
}

function getTasksForDate(d) {
  const dKey = dk(d);
  return state.tasks.filter(t => {
    if(t.repeat==='daily') return true;
    if(t.repeat==='weekly') return t.deadline ? new Date(t.deadline).getDay()===d.getDay() : true;
    if(t.repeat==='monthly') return t.deadline ? new Date(t.deadline).getDate()===d.getDate() : true;
    if(t.deadline) return t.deadline===dKey;
    return t.createdAt.slice(0,10)<=dKey;
  });
}
function isDone(task, dKey) { return !!(task.doneMap && task.doneMap[dKey]); }

const sectionOpen = { today:true, undone:true, future:false };

function toggleSection(sec) {
  sectionOpen[sec] = !sectionOpen[sec];
  const open = sectionOpen[sec];
  document.getElementById('sec-'+sec+'-list').style.display = open ? 'block' : 'none';
  const chev = document.getElementById('sec-'+sec+'-chev');
  if(chev) chev.classList.toggle('closed', !open);
  const hd = document.getElementById('sec-'+sec+'-hd');
  if(hd) hd.classList.toggle('has-items', open);
}

function renderSection(secId, tasks, dKey, show) {
  const sec   = document.getElementById('sec-'+secId);
  const list  = document.getElementById('sec-'+secId+'-list');
  const badge = document.getElementById('sec-'+secId+'-badge');
  const hd    = document.getElementById('sec-'+secId+'-hd');
  if(!tasks.length) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  badge.textContent = tasks.length;
  const open = sectionOpen[secId];
  list.style.display = open ? 'block' : 'none';
  if(hd) hd.classList.toggle('has-items', open);
  list.innerHTML = tasks.map(t => renderTaskItem(t, dKey)).join('');
}

function renderTasks() {
  const dKey     = dk(currentDate);
  const todayStr = today();
  const po       = {p1:0, p2:1, p3:2};

  // KPI
  const allTasks = getTasksForDate(currentDate);
  const done  = allTasks.filter(t=>isDone(t,dKey)).length;
  const total = allTasks.length;
  const rate  = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('kpi-total').textContent   = total;
  document.getElementById('kpi-done').textContent    = done;
  document.getElementById('kpi-remaining').textContent = `残り ${total-done} 件`;
  document.getElementById('kpi-rate').textContent    = `達成率 ${rate}%`;
  document.getElementById('kpi-prog').style.width    = rate+'%';
  document.getElementById('kpi-prog2').style.width   = rate+'%';
  const overdueTasks = state.tasks.filter(t=>t.deadline&&t.deadline<todayStr&&!isDone(t,todayStr)&&t.repeat==='none');
  document.getElementById('kpi-overdue').textContent = overdueTasks.length;
  document.getElementById('task-count-badge') && (document.getElementById('task-count-badge').textContent = total);
  const hDone = state.habits.filter(h=>{ const l=state.habitLogs[dKey]&&state.habitLogs[dKey][h.id]; return l&&l.status; }).length;
  document.getElementById('kpi-habit').textContent       = hDone;
  document.getElementById('kpi-habit-total').textContent = `/ ${state.habits.length} 習慣`;
  const banner = document.getElementById('overdue-banner');
  if(overdueTasks.length) { banner.style.display='flex'; document.getElementById('overdue-text').textContent=`期限超過 ${overdueTasks.length} 件 — 要確認`; }
  else banner.style.display='none';

  // フィルター適用
  function applyFilter(list) {
    return list.filter(t => {
      if(currentFilter==='work')    return t.cat==='work';
      if(currentFilter==='private') return t.cat==='private';
      if(currentFilter==='p1')      return t.priority==='p1';
      if(currentFilter==='undone')  return !isDone(t,dKey);
      return true;
    });
  }

  // ── 今日のタスク ──
  // 今日の日付に該当するタスク（繰り返し含む）
  let todayTasks = applyFilter(allTasks)
    .sort((a,b)=>{ const da=isDone(a,dKey)?1:0,db=isDone(b,dKey)?1:0; if(da!==db) return da-db; return (po[a.priority]||1)-(po[b.priority]||1); });
  renderSection('today', todayTasks, dKey);

  // ── 未完了タスク（持ち越し）──
  // repeat=none、今日より前に作成/期限切れ、今日未完了、今日一覧に出ていないもの
  const todayIds = new Set(allTasks.map(t=>t.id));
  let undoneTasks = applyFilter(
    state.tasks.filter(t => {
      if(t.repeat !== 'none') return false;
      if(isDone(t, todayStr)) return false;
      if(todayIds.has(t.id)) return false;
      const created = t.createdAt.slice(0,10);
      return created < todayStr || (t.deadline && t.deadline < todayStr);
    })
  ).sort((a,b)=>(po[a.priority]||1)-(po[b.priority]||1));
  renderSection('undone', undoneTasks, todayStr);

  // ── これから予定 ──
  // deadline が今日より未来、未完了、今日一覧にないもの
  let futureTasks = applyFilter(
    state.tasks.filter(t => {
      if(t.repeat !== 'none') return false;
      if(!t.deadline || t.deadline <= todayStr) return false;
      if(isDone(t, t.deadline)) return false;
      return true;
    })
  ).sort((a,b)=> a.deadline < b.deadline ? -1 : a.deadline > b.deadline ? 1 : (po[a.priority]||1)-(po[b.priority]||1));
  renderSection('future', futureTasks, todayStr);

  renderTimelineStrip();
}

function renderTaskItem(t, dKey) {
  const d   = isDone(t,dKey);
  const ov  = t.deadline && t.deadline < dKey && !d;
  const catT  = t.cat==='work'?'<span class="tag t-work">仕事</span>':'<span class="tag t-priv">生活</span>';
  const priT  = {p1:'<span class="tag t-p1">HIGH</span>',p2:'<span class="tag t-p2">MID</span>',p3:'<span class="tag t-p3">LOW</span>'}[t.priority]||'';
  const repT  = t.repeat!=='none'?`<span class="tag t-rep">${{'daily':'毎日','weekly':'毎週','monthly':'毎月'}[t.repeat]}</span>`:'';
  const dlT   = t.deadline?`<span class="task-dl${ov?' overdue':''}">📅 ${t.deadline}</span>`:'';
  const timeT = t.startTime?`<span class="tag" style="background:rgba(129,140,248,.1);color:var(--accent2);border:1px solid rgba(129,140,248,.2)">⏰ ${t.startTime}${t.duration?' '+t.duration+'分':''}</span>`:'';
  return `<div class="task-item"><div class="task-check${d?' done':''}" onclick="toggleTask('${t.id}','${dKey}')"></div><div class="task-body"><div class="task-name${d?' done':''}">${t.name}</div><div class="task-tags">${catT}${priT}${repT}${timeT}${dlT}</div>${t.memo?`<div class="task-memo">${t.memo}</div>`:''}</div><div class="task-actions"><button class="icon-btn" onclick="openEditTask('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="icon-btn" onclick="deleteTask('${t.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H5L4 6"/><path d="M10 11v6M14 11v6"/></svg></button></div></div>`;
}

// HABITS
const TIMING_DEF = {
  morning: { label:'朝',    icon:'🌅', cls:'hs-morning', badge:'tb-morning' },
  night:   { label:'夜',    icon:'🌙', cls:'hs-night',   badge:'tb-night'   },
  allday:  { label:'終日',  icon:'☀️', cls:'hs-allday',  badge:'tb-allday'  },
};
const TIMING_ORDER = ['morning','night','allday'];

function calcStreak(hId) {
  let s=0; const d=new Date();
  for(let i=0;i<365;i++) { const dKey=dk(d); const l=state.habitLogs[dKey]&&state.habitLogs[dKey][hId]; if(l&&l.status==='maru') s++; else break; d.setDate(d.getDate()-1); }
  return s;
}

function selectTiming(t) {
  document.getElementById('hi-timing').value = t;
  document.querySelectorAll('.timing-tab').forEach(el=>el.className='timing-tab');
  document.getElementById('tt-'+t).classList.add('sel-'+t);
}

function renderHabits() {
  const dKey = dk(currentDate);
  const maru    = state.habits.filter(h=>state.habitLogs[dKey]&&state.habitLogs[dKey][h.id]&&state.habitLogs[dKey][h.id].status==='maru').length;
  const sankaku = state.habits.filter(h=>state.habitLogs[dKey]&&state.habitLogs[dKey][h.id]&&state.habitLogs[dKey][h.id].status==='sankaku').length;
  const batsu   = state.habits.filter(h=>state.habitLogs[dKey]&&state.habitLogs[dKey][h.id]&&state.habitLogs[dKey][h.id].status==='batsu').length;
  document.getElementById('hsum-bar').innerHTML=`
    <div class="hsum-card"><div class="hsum-icon">○</div><div class="hsum-count" style="color:#34d399">${maru}</div><div class="hsum-label">達成</div></div>
    <div class="hsum-card"><div class="hsum-icon">△</div><div class="hsum-count" style="color:#fbbf24">${sankaku}</div><div class="hsum-label">部分</div></div>
    <div class="hsum-card"><div class="hsum-icon">✕</div><div class="hsum-count" style="color:#f87171">${batsu}</div><div class="hsum-label">未達</div></div>
    <div class="hsum-card"><div class="hsum-icon">—</div><div class="hsum-count" style="color:var(--text2)">${state.habits.length-maru-sankaku-batsu}</div><div class="hsum-label">未記録</div></div>`;

  const list = document.getElementById('habit-list');
  if(!state.habits.length) { list.innerHTML='<div class="empty-state">習慣を追加してください</div>'; return; }

  const days14=[];
  for(let i=13;i>=0;i--) { const d=new Date(); d.setDate(d.getDate()-i); days14.push(dk(d)); }

  let html = '';
  TIMING_ORDER.forEach(timing => {
    const tDef = TIMING_DEF[timing];
    const group = state.habits.filter(h=>(h.timing||'morning')===timing)
                              .sort((a,b)=>(a.order||0)-(b.order||0));

    html += `<div class="habit-section ${tDef.cls}">
      <div class="habit-section-header">
        <span class="habit-section-icon">${tDef.icon}</span>
        <span class="habit-section-title">${tDef.label}</span>
        <span class="habit-section-count">${group.length}件</span>
      </div>
      <div class="habit-section-body">`;

    if(!group.length) {
      html += `<div class="habit-section-empty">習慣を追加してください</div>`;
    } else {
      group.forEach((h, idx) => {
        const log    = (state.habitLogs[dKey]&&state.habitLogs[dKey][h.id])||{status:'',memo:''};
        const streak = calcStreak(h.id);
        const heatmap= days14.map(d=>{ const s=state.habitLogs[d]&&state.habitLogs[d][h.id]&&state.habitLogs[d][h.id].status; return `<div class="hm-cell${s?' '+s:''}" title="${d}"></div>`; }).join('');
        const isFirst = idx===0;
        const isLast  = idx===group.length-1;
        html += `<div class="habit-item">
          <div class="habit-row1">
            <div class="habit-order-btns">
              <button class="order-btn" onclick="habitMoveUp('${h.id}')" ${isFirst?'disabled':''}>▲</button>
              <button class="order-btn" onclick="habitMoveDown('${h.id}')" ${isLast?'disabled':''}>▼</button>
            </div>
            <div class="habit-name">${h.name}${streak>1?` <span class="habit-streak">🔥${streak}日連続</span>`:''}</div>
            <div class="habit-btns">
              <button class="habit-btn${log.status==='maru'?' h-maru':''}" onclick="setHabit('${h.id}','maru')">○</button>
              <button class="habit-btn${log.status==='sankaku'?' h-sankaku':''}" onclick="setHabit('${h.id}','sankaku')">△</button>
              <button class="habit-btn${log.status==='batsu'?' h-batsu':''}" onclick="setHabit('${h.id}','batsu')">✕</button>
              <button class="icon-btn" onclick="openEditHabit('${h.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
              <button class="icon-btn" onclick="deleteHabit('${h.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H5L4 6"/></svg></button>
            </div>
          </div>
          <div class="habit-heatmap">${heatmap}</div>
          <textarea class="habit-memo-input" rows="1" placeholder="メモ..." onchange="setHabitMemo('${h.id}',this.value)">${log.memo||''}</textarea>
        </div>`;
      });
    }
    html += `</div></div>`;
  });

  list.innerHTML = html;
}

function habitMoveUp(id) {
  const h = state.habits.find(h=>h.id===id); if(!h) return;
  const timing = h.timing||'morning';
  const group  = state.habits.filter(h=>(h.timing||'morning')===timing).sort((a,b)=>(a.order||0)-(b.order||0));
  const idx    = group.findIndex(h=>h.id===id);
  if(idx===0) return;
  // swap order values
  const prev = group[idx-1];
  const tmp  = h.order||0; h.order = prev.order||0; prev.order = tmp;
  // ensure unique orders
  reindexGroup(timing);
  saveState(); renderHabits();
}
function habitMoveDown(id) {
  const h = state.habits.find(h=>h.id===id); if(!h) return;
  const timing = h.timing||'morning';
  const group  = state.habits.filter(h=>(h.timing||'morning')===timing).sort((a,b)=>(a.order||0)-(b.order||0));
  const idx    = group.findIndex(h=>h.id===id);
  if(idx===group.length-1) return;
  const next = group[idx+1];
  const tmp  = h.order||0; h.order = next.order||0; next.order = tmp;
  reindexGroup(timing);
  saveState(); renderHabits();
}
function reindexGroup(timing) {
  state.habits.filter(h=>(h.timing||'morning')===timing)
              .sort((a,b)=>(a.order||0)-(b.order||0))
              .forEach((h,i)=>h.order=i);
}

function setHabit(hId, status) {
  const dKey=dk(currentDate);
  if(!state.habitLogs[dKey]) state.habitLogs[dKey]={};
  if(!state.habitLogs[dKey][hId]) state.habitLogs[dKey][hId]={status:'',memo:''};
  state.habitLogs[dKey][hId].status = state.habitLogs[dKey][hId].status===status?'':status;
  saveState(); renderHabits(); renderTasks();
}
function setHabitMemo(hId, memo) {
  const dKey=dk(currentDate);
  if(!state.habitLogs[dKey]) state.habitLogs[dKey]={};
  if(!state.habitLogs[dKey][hId]) state.habitLogs[dKey][hId]={status:'',memo:''};
  state.habitLogs[dKey][hId].memo=memo; saveState();
}

function openAddHabit() {
  document.getElementById('hi-name').value='';
  document.getElementById('hi-edit-id').value='';
  document.getElementById('modal-habit-title').textContent='習慣を追加';
  selectTiming('morning');
  document.getElementById('modal-habit').classList.add('open');
}
function openEditHabit(id) {
  const h = state.habits.find(h=>h.id===id); if(!h) return;
  document.getElementById('hi-name').value = h.name;
  document.getElementById('hi-edit-id').value = id;
  document.getElementById('modal-habit-title').textContent='習慣を編集';
  selectTiming(h.timing||'morning');
  document.getElementById('modal-habit').classList.add('open');
}
function saveHabit() {
  const name   = document.getElementById('hi-name').value.trim();
  const timing = document.getElementById('hi-timing').value;
  const editId = document.getElementById('hi-edit-id').value;
  if(!name) { showToast('習慣名を入力してください','err'); return; }

  if(editId) {
    const h = state.habits.find(h=>h.id===editId);
    if(h) {
      const oldTiming = h.timing||'morning';
      h.name   = name;
      h.timing = timing;
      if(oldTiming!==timing) {
        // move to end of new group
        const newGroup = state.habits.filter(x=>(x.timing||'morning')===timing&&x.id!==editId);
        h.order = newGroup.length;
        reindexGroup(oldTiming);
      }
    }
    showToast('更新しました ✓','ok');
  } else {
    const groupCount = state.habits.filter(h=>(h.timing||'morning')===timing).length;
    state.habits.push({id:uid(), name, timing, order:groupCount});
    showToast('追加しました ✓','ok');
  }
  closeModal('modal-habit'); saveState(); renderHabits();
}
function deleteHabit(id) {
  if(!confirm('削除しますか？')) return;
  const h = state.habits.find(h=>h.id===id);
  const timing = h ? (h.timing||'morning') : 'morning';
  state.habits=state.habits.filter(h=>h.id!==id);
  reindexGroup(timing);
  saveState(); renderHabits();
}

// TIMELOG
const GANTT_START = 0;   // 0時から
const GANTT_END   = 24;  // 24時まで
const GANTT_RANGE = GANTT_END - GANTT_START; // 24時間

function timeToFrac(timeStr) {
  // "HH:MM" → 0.0〜1.0 (GANTT_STARTからGANTT_ENDの範囲で)
  if(!timeStr) return null;
  const [h,m] = timeStr.split(':').map(Number);
  return (h + m/60 - GANTT_START) / GANTT_RANGE;
}

function renderTimelog() {
  renderGantt();
  renderLogInputs();
}

function renderGantt() {
  const dKey = dk(currentDate);
  const shiftCode = state.shifts && state.shifts[dKey];
  const shift = shiftCode ? SHIFTS[shiftCode] : null;
  const tasksForDay = getTasksForDate(currentDate).filter(t => t.startTime && t.duration);
  const now = new Date();
  const isToday = dKey === today();
  const nowFrac = isToday ? (now.getHours() + now.getMinutes()/60 - GANTT_START) / GANTT_RANGE : null;

  let html = '';

  // ---- 時間軸 ----
  html += `<div class="tl-axis-row"><div class="tl-axis-spacer"></div><div class="tl-axis-hours" id="tl-axis-hours">`;
  for(let h = GANTT_START; h <= GANTT_END; h += 2) {
    const frac = (h - GANTT_START) / GANTT_RANGE;
    html += `<div class="tl-axis-tick" style="left:${frac*100}%"><div class="tl-axis-tick-line"></div><div class="tl-axis-tick-label">${String(h).padStart(2,'0')}</div></div>`;
  }
  html += `</div></div>`;

  // ---- シフトバー ----
  if(shift && shift.start !== null) {
    const sf = (shift.start - GANTT_START) / GANTT_RANGE;
    const ef = (shift.end   - GANTT_START) / GANTT_RANGE;
    const clampedSf = Math.max(0, sf);
    const clampedW  = Math.min(1, ef) - clampedSf;
    html += `<div class="tl-shift-row" style="position:relative">
      <div class="tl-row-label" style="color:${shift.color}">${shift.label}</div>
      <div class="tl-row-bars" style="position:relative">
        <div class="tl-shift-fill" style="left:${clampedSf*100}%;width:${clampedW*100}%;background:${shift.dot}"></div>
        <div class="tl-shift-label-over" style="left:${clampedSf*100}%;color:${shift.dot}">${shift.time}</div>
        ${nowFrac!==null&&nowFrac>=0&&nowFrac<=1?`<div class="tl-now-line" style="left:${nowFrac*100}%"><div class="tl-now-dot"></div></div>`:''}
      </div>
    </div>`;
  } else if(shiftCode === 'off') {
    html += `<div class="tl-shift-row">
      <div class="tl-row-label" style="color:${SHIFTS.off.color}">休日</div>
      <div class="tl-row-bars" style="display:flex;align-items:center;padding-left:12px;font-size:10px;color:var(--text3)">
        休日
        ${nowFrac!==null&&nowFrac>=0&&nowFrac<=1?`<div class="tl-now-line" style="left:${nowFrac*100}%"><div class="tl-now-dot"></div></div>`:''}
      </div>
    </div>`;
  }

  // ---- タスクバー ----
  if(!tasksForDay.length) {
    html += `<div class="tl-no-task">⏰ 開始時刻・予定時間が設定されたタスクがありません</div>`;
  } else {
    tasksForDay.forEach(t => {
      const startFrac = timeToFrac(t.startTime);
      if(startFrac === null) return;
      const durFrac = t.duration / (GANTT_RANGE * 60); // duration in minutes → fraction
      const endFrac = startFrac + durFrac;

      // actual end from log: if task is done, use actual log end (approx by checking last filled hour >= startHour)
      // For simplicity: check if now has passed the scheduled end — if so bar turns red
      const done = isDone(t, dKey);
      const [sh, sm] = t.startTime.split(':').map(Number);
      const scheduledEndMin = sh * 60 + sm + t.duration;
      const nowMin = isToday ? now.getHours()*60 + now.getMinutes() : 0;
      const isOver = isToday && !done && (nowMin > scheduledEndMin);

      const clampedStart = Math.max(0, startFrac);
      const clampedW = Math.min(1, endFrac) - clampedStart;
      if(clampedW <= 0) return;

      const priColor = {p1:'#f87171',p2:'#fbbf24',p3:'#34d399'}[t.priority]||'#38bdf8';
      const hhmm = (min) => `${String(Math.floor(min/60)%24).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`;
      const endLabel = hhmm(scheduledEndMin);

      html += `<div class="tl-task-row">
        <div class="tl-task-label">${t.name.length>6?t.name.slice(0,5)+'…':t.name}</div>
        <div class="tl-task-bars-wrap" style="position:relative">
          <div class="tl-task-bar ${isOver?'over':'ok'}" style="left:${clampedStart*100}%;width:${clampedW*100}%;border-left:3px solid ${priColor}">
            <div class="tl-task-bar-label" style="color:${isOver?'#fca5a5':'#e0f2fe'}">${t.startTime}〜${endLabel}${t.duration?` (${t.duration}分)`:''}</div>
          </div>
          ${isOver?`<div class="tl-over-marker" style="left:${Math.min(1,endFrac)*100}%"></div>`:''}
          ${nowFrac!==null&&nowFrac>=0&&nowFrac<=1?`<div class="tl-now-line" style="left:${nowFrac*100}%"><div class="tl-now-dot"></div></div>`:''}
        </div>
      </div>`;
    });
  }

  const gantt = document.getElementById('tl-gantt-body');
  if(gantt) gantt.innerHTML = html;

  // 現在時刻で自動更新（今日の場合）
  if(isToday) setTimeout(renderGantt, 60000);
}

    const hourStyle = inShift ? `style="color:${shift.dot};border-right-color:${shift.dot}30"` : '';
    const rowStyle = inShift ? `style="background:rgba(${hexToRgb(shift.dot)},.04)"` : '';
    html+=`<div class="timelog-row${isCur?' cur-row':''}" ${rowStyle}>

      <input class="tl-input" id="tl-${hh}" value="${val}" placeholder="${isCur?'← 今ここ':''}">

function getSalesForMonth(y, m) {
  // return array of {dKey, day, data} for the month
  if(!state.sales) return [];
  const lastDay = new Date(y, m+1, 0).getDate();
  const result = [];
  for(let d=1; d<=lastDay; d++) {
    const dKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(state.sales[dKey]) result.push({ dKey, day:d, data:state.sales[dKey] });
  }
  return result;
}

function getPeriodSums(y, m) {
  // 1-10, 11-20, 21-末日
  const lastDay = new Date(y, m+1, 0).getDate();
  const periods = [
    { label:'1〜10日', start:1,  end:10 },
    { label:'11〜20日',start:11, end:20 },
    { label:`21〜${lastDay}日`, start:21, end:lastDay },
  ];
  return periods.map(p => {
    let total=0, cash=0;
    for(let d=p.start; d<=p.end; d++) {
      const dKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const rec = state.sales && state.sales[dKey];
      if(rec) { total += (rec.free||0)+(rec.client||0); cash += (rec.cash||0); }
    }
    return { ...p, total, cash };
  });
}

    for(let d=1;d<=lastDay;d++){

      <div>

    </div>`;
  });

  // 月合計カード（3列の下に横幅フル）
  html += `<div class="sps-month-total">
    <div style="font-size:9px;font-weight:700;color:var(--text2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px">
      ${y}年${m+1}月 月間合計

      </div>
    </div>
  </div>`;

  document.getElementById('sales-period-strip').innerHTML = html;
}

  document.getElementById('sales-day-list').innerHTML = html || '<div class="empty-state">記録なし</div>';

  document.getElementById('cal-dow').style.display  = calView==='month' ? 'grid' : 'none';

  if(calView === '1day')  renderCal1Day(todayStr);
  else if(calView === '10day') renderCal10Day(todayStr);
  else                         renderCalMonth(todayStr);
}

/* ---- helpers ---- */
function getDayInfo(d) {
  const dKey = dk(d);
  const tasks = getTasksForDate(d);
  const doneCnt = tasks.filter(t=>isDone(t,dKey)).length;
  const shiftCode = state.shifts && state.shifts[dKey];
  const hLog = state.habitLogs[dKey] || {};
  const habitDone = state.habits.filter(h=>hLog[h.id]&&hLog[h.id].status==='maru').length;
  return { dKey, tasks, doneCnt, shiftCode, habitDone, total:tasks.length };
}

/* ---- 1DAY ---- */
function renderCal1Day(todayStr) {
  const selStr = calSelectedDate ? dk(calSelectedDate) : todayStr;
  const parts = selStr.split('-');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  const { tasks, doneCnt, shiftCode } = getDayInfo(d);
  const shift = shiftCode ? SHIFTS[shiftCode] : null;

  document.getElementById('cal-nav-title').textContent = '';

  // 7-day mini row for quick day pick
  const days7 = [];
  for(let i=-3;i<=3;i++) { const dd=new Date(d); dd.setDate(dd.getDate()+i); days7.push(dd); }

  let html = `<div style="display:flex;gap:4px;margin-bottom:14px;justify-content:center">`;
  days7.forEach(dd => {
    const dds = dk(dd);
    const isSel = dds===selStr;
    const isTdy = dds===todayStr;
    const isWknd = dd.getDay()===0||dd.getDay()===6;
    const sc = state.shifts&&state.shifts[dds];
    html += `<div onclick="calSelectDay('${dds}')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:9px;border:1px solid ${isSel?'var(--accent)':isTdy?'rgba(56,189,248,.3)':'var(--border)'};background:${isSel?'rgba(56,189,248,.15)':isTdy?'rgba(56,189,248,.05)':'var(--surface2)'};cursor:pointer">
      <div style="font-size:9px;color:${isWknd?(dd.getDay()===0?'#f87171':'#818cf8'):'var(--text3)'}">${DAYS[dd.getDay()]}</div>
      <div style="font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${isSel?'var(--accent)':isTdy?'var(--accent)':'var(--text2)'}">${dd.getDate()}</div>
      ${sc?`<div style="width:16px;height:3px;border-radius:2px;background:${SHIFT_COLORS[sc]||'var(--border)'}"></div>`:'<div style="width:16px;height:3px"></div>'}
    </div>`;
  });
  html += `</div>`;

  // Day detail
  html += `<div class="cal-1day-info">
    <div class="cal-1day-title">${fmtDate(d)} ${DAYS[d.getDay()]}曜日</div>
    <div class="cal-1day-shift">${shift?`<span style="color:${shift.dot};font-weight:700">${shift.label}</span> ${shift.time}`:'シフト未設定'}</div>
    <div style="font-size:10px;color:var(--text2);margin-bottom:6px;font-family:'JetBrains Mono',monospace">タスク ${doneCnt}/${tasks.length} 完了</div>
    <div class="cal-1day-task-list">`;
  if(!tasks.length) {
    html += `<div style="font-size:12px;color:var(--text3);text-align:center;padding:10px">タスクなし</div>`;
  } else {
    tasks.forEach(t=>{
      const done = isDone(t, selStr);
      const pc = PRI_COLORS[t.priority]||'var(--accent2)';
      html += `<div class="cal-1day-task-item" style="border-left-color:${pc};opacity:${done?.6:1}">
        <div class="cal-1day-task-name" style="${done?'text-decoration:line-through;color:var(--text3)':''}">${t.name}</div>
        ${t.startTime?`<div class="cal-1day-task-time">${t.startTime}${t.duration?'+'+t.duration+'m':''}</div>`:''}
      </div>`;
    });
  }
  html += `</div></div>`;
  document.getElementById('cal-body').innerHTML = html;
}

/* ---- 10DAY ---- */
function renderCal10Day(todayStr) {
  const selStr = calSelectedDate ? dk(calSelectedDate) : todayStr;
  // build 10 days starting from calNavDate aligned to decade
  const base = new Date(calNavDate);
  base.setDate(1); // start from month start, find decade
  const d = calNavDate.getDate();
  let startDay = d <= 10 ? 1 : d <= 20 ? 11 : 21;
  const decadeStart = new Date(calNavDate.getFullYear(), calNavDate.getMonth(), startDay);

  const m = decadeStart.getMonth()+1;
  const decade = startDay===1?'上旬':startDay===11?'中旬':'下旬';
  document.getElementById('cal-nav-title').textContent = `${decadeStart.getFullYear()}年${m}月${decade}`;

  let html = `<div class="cal-10day-wrap">`;
  for(let i=0;i<10;i++) {
    const dd = new Date(decadeStart); dd.setDate(decadeStart.getDate()+i);
    const dds = dk(dd);
    const {tasks, doneCnt, shiftCode, habitDone} = getDayInfo(dd);
    const isSel = dds===selStr; const isTdy = dds===todayStr;
    const isWknd = dd.getDay()===0||dd.getDay()===6;
    const sc = shiftCode; const shift = sc?SHIFTS[sc]:null;
    const shiftStart = shift&&shift.start!==null ? (shift.start/24)*100 : null;
    const shiftW = shift&&shift.start!==null ? ((shift.end-shift.start)/24)*100 : 0;
    const habitRate = state.habits.length ? (habitDone/state.habits.length)*100 : 0;

    html += `<div class="cal-10day-row${isSel?' selected':''}${isTdy?' today':''}" onclick="calSelectDay('${dds}')">
      <div class="c10-date" style="color:${isSel?'var(--accent)':isTdy?'var(--accent)':isWknd?(dd.getDay()===0?'#f87171':'#818cf8'):'var(--text)'}">${String(m).padStart(2,'0')}/${String(dd.getDate()).padStart(2,'0')}</div>
      <div class="c10-wd" style="color:${dd.getDay()===0?'#f87171':dd.getDay()===6?'#818cf8':'var(--text3)'}">${DAYS[dd.getDay()]}</div>
      <div class="c10-shift" style="color:${sc?SHIFT_COLORS[sc]:'var(--text3)'}">${sc||'—'}</div>
      <div class="c10-bar-wrap">
        ${shiftStart!==null?`<div class="c10-shift-fill" style="left:${shiftStart}%;width:${shiftW}%;background:${SHIFT_COLORS[sc]}"></div>`:''}
        ${tasks.filter(t=>t.startTime&&t.duration).map(t=>{
          const sf = (parseInt(t.startTime)/24)*100;
          const wf = (t.duration/(24*60))*100;
          const pc = PRI_COLORS[t.priority]||'#818cf8';
          return `<div style="position:absolute;top:2px;bottom:2px;left:${sf}%;width:${Math.max(wf,1)}%;background:${pc};border-radius:2px;opacity:.8"></div>`;
        }).join('')}
      </div>
      <div class="c10-task-pills">
        ${tasks.slice(0,5).map(t=>`<div class="c10-task-pill" style="background:${PRI_COLORS[t.priority]||'#818cf8'};opacity:${isDone(t,dds)?.4:1}"></div>`).join('')}
        ${tasks.length>5?`<div style="font-size:9px;color:var(--text3)">+${tasks.length-5}</div>`:''}
      </div>
      <div class="c10-habit">${state.habits.length?`${habitDone}/${state.habits.length}`:''}</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('cal-body').innerHTML = html;
}

/* ---- MONTH ---- */
function renderCalMonth(todayStr) {
  const selStr = calSelectedDate ? dk(calSelectedDate) : todayStr;
  const y = calNavDate.getFullYear(), m = calNavDate.getMonth();
  document.getElementById('cal-nav-title').textContent = `${y}年${m+1}月`;

  const firstDay = new Date(y, m, 1);
  const lastDay  = new Date(y, m+1, 0);
  const startDow = firstDay.getDay(); // 0=Sun

  let html = `<div class="cal-month-grid">`;
  // blank cells before month start
  for(let i=0;i<startDow;i++) {
    const prevDate = new Date(y, m, 1-startDow+i);
    const dds = dk(prevDate);
    html += renderMonthCell(prevDate, dds, selStr, todayStr, true);
  }
  for(let d=1;d<=lastDay.getDate();d++) {
    const dd = new Date(y,m,d);
    const dds = dk(dd);
    html += renderMonthCell(dd, dds, selStr, todayStr, false);
  }
  // fill remaining
  const total = startDow + lastDay.getDate();
  const rem = (7 - (total%7)) % 7;
  for(let i=1;i<=rem;i++) {
    const nextDate = new Date(y,m+1,i);
    const dds = dk(nextDate);
    html += renderMonthCell(nextDate, dds, selStr, todayStr, true);
  }
  html += '</div>';
  document.getElementById('cal-body').innerHTML = html;
}

function renderMonthCell(dd, dds, selStr, todayStr, otherMonth) {
  const {tasks, doneCnt, shiftCode, habitDone} = getDayInfo(dd);
  const isSel = dds===selStr; const isTdy = dds===todayStr;
  const dow = dd.getDay();
  const isSun = dow===0; const isSat = dow===6;
  const sc = shiftCode; const shiftDot = sc&&SHIFT_COLORS[sc] ? SHIFT_COLORS[sc] : null;
  const habitRate = state.habits.length ? (habitDone/state.habits.length)*100 : 0;
  const taskDots = tasks.slice(0,5).map(t=>`<div class="cal-task-dot" style="background:${PRI_COLORS[t.priority]||'#818cf8'};opacity:${isDone(t,dds)?.4:1}"></div>`).join('');

  let cls = 'cal-day';
  if(otherMonth) cls += ' other-month';
  if(isTdy) cls += ' today';
  if(isSel) cls += ' selected';
  if(isSun&&!otherMonth) cls += ' sun-col';
  if(isSat&&!otherMonth) cls += ' sat-col';

  return `<div class="${cls}" onclick="calSelectDay('${dds}')">
    <div class="cal-day-num">${dd.getDate()}</div>
    ${shiftDot&&!otherMonth?`<div class="cal-shift-dot" style="background:${shiftDot}"></div>`:''}
    ${tasks.length&&!otherMonth?`<div class="cal-task-dots">${taskDots}</div>`:''}
    ${state.habits.length&&!otherMonth&&habitRate>0?`<div class="cal-habit-bar"><div class="cal-habit-fill" style="width:${habitRate}%"></div></div>`:''}
  </div>`;
}

// init calendar with correct display state
(function initCal() {
  document.getElementById('cal-nav').style.display = 'none';
  document.getElementById('cal-dow').style.display = 'none';
})();

loadState(); updateHeader(); renderTasks(); renderHabits(); renderTimelog(); renderTimelineStrip(); renderShift(); salesNavDate=new Date(); salesInputDate=new Date();
</script>
